services:
  - type: web
    name: voting-signal-agent
    env: node
    buildCommand: npm install
    startCommand: node src/voting_index.js
    envVars:
      - key: DISCORD_VOTING_WEBHOOK
        sync: false
      - key: TWELVEDATA_API_KEY_1
        sync: false
      - key: TWELVEDATA_API_KEY_2
        sync: false
      - key: TWELVEDATA_API_KEY_3
        sync: false
      - key: TWELVEDATA_API_KEY_4
        sync: false
      - key: TWELVEDATA_API_KEY_5
        sync: false
      - key: DEBUG_MODE
        value: false
